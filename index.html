<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f0e8" />
    <title>Tim Compass</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <section class="topbar" aria-label="Tim Compass status">
        <div>
          <p class="eyebrow">Tim Compass</p>
          <h1 id="targetName">Find your nearest Tim Hortons</h1>
        </div>
        <button class="icon-button" id="refreshButton" type="button" aria-label="Refresh nearest Tim Hortons">
          <span aria-hidden="true">↻</span>
        </button>
      </section>

      <section class="compass-stage" aria-label="Compass">
        <div class="distance-pill" id="distanceText">Location needed</div>
        <div class="compass" aria-hidden="true">
          <div class="compass-ring">
            <span class="cardinal north">N</span>
            <span class="cardinal east">E</span>
            <span class="cardinal south">S</span>
            <span class="cardinal west">W</span>
          </div>
          <div class="needle" id="needle">
            <div class="needle-head"></div>
            <div class="needle-tail"></div>
          </div>
          <div class="center-cap">
            <span></span>
          </div>
        </div>
      </section>

      <section class="info-panel" aria-label="Nearest Tim Hortons details">
        <div class="metric">
          <span>Direction</span>
          <strong id="bearingText">--</strong>
        </div>
        <div class="metric">
          <span>Distance</span>
          <strong id="detailDistance">--</strong>
        </div>
        <div class="metric">
          <span>Accuracy</span>
          <strong id="accuracyText">--</strong>
        </div>
      </section>

      <section class="actions" aria-label="Controls">
        <button class="primary-button" id="locateButton" type="button">Use my location</button>
        <button class="secondary-button" id="demoButton" type="button">Demo</button>
      </section>

      <p class="status" id="statusText">Ready when you are.</p>
    </main>

    <div class="celebration" id="celebration" aria-hidden="true">
      <div class="celebration-sky">
        <span class="burst burst-one"></span>
        <span class="burst burst-two"></span>
        <span class="burst burst-three"></span>
      </div>
      <div class="leaf leaf-one" aria-hidden="true"></div>
      <div class="leaf leaf-two" aria-hidden="true"></div>
      <div class="leaf leaf-three" aria-hidden="true"></div>
      <div class="cup" aria-hidden="true">
        <span class="cup-lid"></span>
        <span class="cup-body"></span>
        <span class="cup-label">TIM</span>
      </div>
      <div class="celebration-copy">
        <p>Arrived</p>
        <strong>Double-double time</strong>
      </div>
    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
